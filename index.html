<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=windows-1252" />
	<meta name="viewport" content="width=device-width">
	<style>
		body {
			font-family: Arial, Helvetica, Sans-Serif;
			margin: 0;
			padding: 20px;
			display: flex;
			justify-content: center;
		}

		.panel {
			width: min(640px, 100%);
			border-radius: 14px;
			padding: 18px;
			box-sizing: border-box;
		}

		.panel.booting {
			visibility: hidden;
		}

		@media (prefers-color-scheme: dark) {
			body {
				background-color: #111315;
				color: #e5e7eb;
			}

			.panel {
				background: #1b2025;
				box-shadow: 0 0 0 1px #2b3138;
			}

			.subtle {
				color: #9ca3af;
			}

			.input,
			.day-btn,
			.primary,
			.secondary {
				background: #232a31;
				color: #e5e7eb;
				border: 1px solid #3a4551;
			}

			.primary {
				background: #0f766e;
				border-color: #14b8a6;
			}
		}

		@media (prefers-color-scheme: light) {
			body {
				background-color: #f4f7fb;
				color: #10243b;
			}

			.panel {
				background: #ffffff;
				box-shadow: 0 10px 30px rgba(16, 36, 59, 0.08);
			}

			.subtle {
				color: #4f647a;
			}

			.input,
			.day-btn,
			.primary,
			.secondary {
				background: #fff;
				color: #10243b;
				border: 1px solid #c9d5e3;
			}

			.primary {
				background: #0d9488;
				color: #fff;
				border-color: #0d9488;
			}
		}

		h1,
		h2,
		h3 {
			margin: 0 0 12px;
		}

		.section {
			padding: 14px;
			border-radius: 10px;
			margin-bottom: 14px;
			background: rgba(127, 127, 127, 0.08);
		}

		.row {
			display: flex;
			align-items: center;
			gap: 8px;
			flex-wrap: wrap;
		}

		.header-row {
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
			gap: 12px;
			margin-bottom: 12px;
		}

		.hours-display {
			min-width: 92px;
			text-align: center;
			font-size: 1.8rem;
			font-weight: 700;
		}

		.btn {
			cursor: pointer;
			padding: 10px 14px;
			border-radius: 10px;
			font-size: 1rem;
		}

		.icon-btn {
			width: 44px;
			height: 44px;
			padding: 0;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 8px;
			-webkit-tap-highlight-color: transparent;
			appearance: none;
		}

		.icon-btn svg {
			width: 26px;
			height: 26px;
		}

		.icon-btn use {
			fill: #14b8a6;
		}

		.icon-btn:hover,
		.icon-btn:focus,
		.icon-btn:active {
			outline: none;
			filter: none;
			box-shadow: none;
		}

		.btn:disabled {
			opacity: 0.5;
			cursor: default;
		}

		.primary,
		.secondary {
			padding: 10px 14px;
			border-radius: 10px;
			font-size: 0.95rem;
			cursor: pointer;
		}

		.input {
			padding: 10px;
			border-radius: 8px;
			font-size: 0.95rem;
		}

		.day-grid {
			display: grid;
			grid-template-columns: repeat(7, minmax(36px, 1fr));
			gap: 6px;
			min-height: 38px;
		}

		.day-btn {
			padding: 8px 0;
			border-radius: 8px;
			text-align: center;
			cursor: pointer;
			user-select: none;
		}

		.day-btn.active {
			background: #0d9488;
			border-color: #0d9488;
			color: #fff;
		}

		.switch-row {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.slider-toggle {
			display: inline-block;
			position: relative;
			width: 92px;
			height: 52px;
		}

		.slider-toggle input {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			margin: 0;
			opacity: 0;
			cursor: pointer;
			z-index: 2;
		}

		.slider-track {
			position: absolute;
			inset: 0;
			border-radius: 28px;
			background-color: #c7d2de;
			transition: background-color 0.25s ease;
		}

		.slider-toggle.init .slider-track,
		.slider-toggle.init .slider-track::before {
			transition: none !important;
		}

		.slider-track::before {
			content: "";
			position: absolute;
			left: 4px;
			top: 4px;
			width: 44px;
			height: 44px;
			border-radius: 50%;
			background: #fff;
			transition: transform 0.25s ease;
		}

		.slider-toggle input:checked+.slider-track {
			background-color: #0d9488;
		}

		.slider-toggle input:checked+.slider-track::before {
			transform: translateX(40px);
		}

		.status {
			font-size: 1.25rem;
			font-weight: 700;
		}

		.status-inline {
			text-align: right;
			min-width: 120px;
		}

		@media (max-width: 520px) {
			.header-row {
				flex-direction: column;
				align-items: flex-start;
			}

			.status-inline {
				text-align: left;
			}
		}

		a {
			color: inherit;
		}
	</style>
</head>

<body>
	<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
		<symbol id="icon-plus" viewBox="0 0 24 24">
			<rect x="10.5" y="4" width="3" height="16" rx="1" />
			<rect x="4" y="10.5" width="16" height="3" rx="1" />
		</symbol>
		<symbol id="icon-minus" viewBox="0 0 24 24">
			<rect x="4" y="10.5" width="16" height="3" rx="1" />
		</symbol>
	</svg>
	<div class="panel booting" id="app_panel">
		<div class="header-row">
			<h1>Timer</h1>
			<div class="status-inline">
				<div class="subtle">Time left</div>
				<div id="time_left" class="status">0:00:00</div>
			</div>
		</div>
		<div class="section">
			<h2>Schedule</h2>
			<div class="switch-row" style="margin-bottom: 10px;">
				<input type="checkbox" id="schedule_enabled">
				<label for="schedule_enabled">Enable weekly schedule</label>
			</div>

			<div class="subtle" style="margin-bottom: 6px;">Days</div>
			<div class="day-grid" id="day_grid">
				<button type="button" class="day-btn" data-day="0">Sun</button>
				<button type="button" class="day-btn" data-day="1">Mon</button>
				<button type="button" class="day-btn" data-day="2">Tue</button>
				<button type="button" class="day-btn" data-day="3">Wed</button>
				<button type="button" class="day-btn" data-day="4">Thu</button>
				<button type="button" class="day-btn" data-day="5">Fri</button>
				<button type="button" class="day-btn" data-day="6">Sat</button>
			</div>

			<div class="row" style="margin-top: 12px;">
				<label for="schedule_start">Start</label>
				<input class="input" type="time" id="schedule_start" value="08:00">
				<label for="schedule_duration_h">Duration</label>
				<input class="input" type="number" id="schedule_duration_h" min="1" max="12" step="1" value="2">
				<span>hours</span>
			</div>

			<button class="primary" id="save_schedule" style="margin-top: 12px;">Save Schedule</button>
			<div id="schedule_status" class="subtle" style="margin-top: 8px; min-height: 1.2em;"></div>
		</div>

		<div class="section">
			<h2>Manual Run</h2>
			<div class="row">
				<button class="btn secondary icon-btn" id="minus_h" aria-label="Decrease hours">
					<svg viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-minus"></use></svg>
				</button>
				<div class="hours-display"><span id="duration_h">5</span>h</div>
				<button class="btn secondary icon-btn" id="plus_h" aria-label="Increase hours">
					<svg viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-plus"></use></svg>
				</button>
			</div>
			<div class="switch-row" style="margin-top: 10px;">
				<label class="slider-toggle init" id="run_now_wrap" style="visibility:hidden;">
					<input type="checkbox" id="switch_on_off">
					<span class="slider-track"></span>
				</label>
				<label for="switch_on_off">Run now</label>
			</div>
		</div>

		<div class="section">
			<h3>Build: __DATE__</h3>
			<h3>Current time: <span id="current_time">--</span></h3>
			<h3>Uptime: <span id="uptime">0 00:00:00</span></h3>
			<h3><a href="/clear">Reset WiFi</a></h3>
		</div>
	</div>
	<script>
		(function () {
			const pathname = window.location.pathname || '/';
			const isRefill = pathname === '/refill' || pathname === '/refill/';
			const WS_PATH = isRefill ? '/ws_refill' : '/ws';
			const PAGE_TITLE = isRefill ? 'Refill Timer' : 'Filter Timer';
			const SCHEDULE_STORAGE_KEY_VAL = isRefill ? 'ecoplug_refill_v1' : 'ecoplug_schedule_v1';
			const MANUAL_HOURS_STORAGE_KEY = isRefill ? 'ecoplug_refill_manual_h_v1' : 'ecoplug_filter_manual_h_v1';
			const REMAINING_TIME_STORAGE_KEY = isRefill ? 'ecoplug_refill_remaining_v1' : 'ecoplug_filter_remaining_v1';
			const RUN_NOW_STATE_STORAGE_KEY = isRefill ? 'ecoplug_refill_run_now_v1' : 'ecoplug_filter_run_now_v1';
			document.querySelector('h1').textContent = PAGE_TITLE;

			const uptime = document.getElementById('uptime');
			const currentTime = document.getElementById('current_time');
			const h = document.getElementById('duration_h');
			const timeLeft = document.getElementById('time_left');
			const plusH = document.getElementById('plus_h');
			const minusH = document.getElementById('minus_h');
			const switch_state = document.getElementById('switch_on_off');
			const runNowWrap = document.getElementById('run_now_wrap');
			const appPanel = document.getElementById('app_panel');
			const scheduleEnabled = document.getElementById('schedule_enabled');
			const scheduleStart = document.getElementById('schedule_start');
			const scheduleDurationH = document.getElementById('schedule_duration_h');
			const saveSchedule = document.getElementById('save_schedule');
			const scheduleStatus = document.getElementById('schedule_status');
			const dayGrid = document.getElementById('day_grid');

			const SCHEDULE_STORAGE_KEY = SCHEDULE_STORAGE_KEY_VAL;

			const dayButtons = Array.from(dayGrid.querySelectorAll('.day-btn'));
			dayButtons.forEach((btn) => {
				btn.onclick = () => btn.classList.toggle('active');
			});

			let uptime_sec = 0, remaining_time_sec = 0;
			let local_epoch_sec = Math.floor(Date.now() / 1000) - (new Date().getTimezoneOffset() * 60);
			let manual_hours = 5;
			let uptime_timer = null;
			const pad0 = (n) => String(Math.floor(n)).padStart(2, '0');
			const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

			const loadManualHours = () => {
				try {
					const raw = localStorage.getItem(MANUAL_HOURS_STORAGE_KEY);
					const parsed = parseInt(raw || '', 10);
					if (Number.isFinite(parsed)) manual_hours = clamp(parsed, 1, 12);
				} catch (error) {
					console.warn('Failed to read manual duration cache', error);
				}
			};

			const saveManualHours = () => {
				try {
					localStorage.setItem(MANUAL_HOURS_STORAGE_KEY, String(manual_hours));
				} catch (error) {
					console.warn('Failed to persist manual duration cache', error);
				}
			};

			const loadRemainingTime = () => {
				try {
					const raw = localStorage.getItem(REMAINING_TIME_STORAGE_KEY);
					const parsed = parseInt(raw || '', 10);
					if (Number.isFinite(parsed) && parsed >= 0) remaining_time_sec = parsed;
				} catch (error) {
					console.warn('Failed to read remaining time cache', error);
				}
			};

			const saveRemainingTime = () => {
				try {
					localStorage.setItem(REMAINING_TIME_STORAGE_KEY, String(Math.max(0, Math.floor(remaining_time_sec))));
				} catch (error) {
					console.warn('Failed to persist remaining time cache', error);
				}
			};

			const loadRunNowState = () => {
				try {
					const raw = localStorage.getItem(RUN_NOW_STATE_STORAGE_KEY);
					if (raw === '1') return true;
					if (raw === '0') return false;
				} catch (error) {
					console.warn('Failed to read run state cache', error);
				}
				return null;
			};

			const saveRunNowState = (isOn) => {
				try {
					localStorage.setItem(RUN_NOW_STATE_STORAGE_KEY, isOn ? '1' : '0');
				} catch (error) {
					console.warn('Failed to persist run state cache', error);
				}
			};

			const durationToClock = (total) => {
				const sec = Math.max(0, Math.floor(total));
				const hr = Math.floor(sec / 3600);
				const min = Math.floor(sec / 60) % 60;
				const s = sec % 60;
				return `${hr}:${pad0(min)}:${pad0(s)}`;
			};

			const renderManual = () => {
				h.textContent = String(manual_hours);
				const disabled = switch_state.checked;
				plusH.disabled = disabled;
				minusH.disabled = disabled;
			};

			const renderTimeLeft = () => {
				timeLeft.textContent = durationToClock(remaining_time_sec);
			};

			const renderCurrentTime = () => {
				if (!Number.isFinite(local_epoch_sec) || local_epoch_sec < 0) {
					currentTime.textContent = '--';
					return;
				}
				const d = new Date(local_epoch_sec * 1000);
				const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
				currentTime.textContent = `${days[d.getUTCDay()]} ${pad0(d.getUTCHours())}:${pad0(d.getUTCMinutes())}:${pad0(d.getUTCSeconds())}`;
			};

			const setDaysFromMask = (mask) => {
				dayButtons.forEach((b, i) => {
					b.classList.toggle('active', ((mask >> i) & 1) === 1);
				});
			};

			const toIntOrNull = (value) => {
				const n = parseInt(value, 10);
				return Number.isFinite(n) ? n : null;
			};

			const loadScheduleUiCache = () => {
				try {
					const raw = localStorage.getItem(SCHEDULE_STORAGE_KEY);
					if (!raw) return;
					const cached = JSON.parse(raw);
					if (cached && Number.isFinite(cached.daysMask)) {
						setDaysFromMask(cached.daysMask & 0x7F);
					}
					if (cached && Number.isFinite(cached.enabled)) {
						scheduleEnabled.checked = cached.enabled === 1;
					}
					if (cached && Number.isFinite(cached.startMin)) {
						const hh = Math.floor(cached.startMin / 60);
						const mm = cached.startMin % 60;
						scheduleStart.value = `${pad0(hh)}:${pad0(mm)}`;
					}
					if (cached && Number.isFinite(cached.durationMin)) {
						scheduleDurationH.value = String(clamp(Math.round(cached.durationMin / 60), 1, 12));
					}
				} catch (error) {
					console.warn('Failed to read schedule cache', error);
				}
			};

			const saveScheduleUiCache = (enabled, daysMask, startMin, durationMin) => {
				try {
					const payload = {
						enabled,
						daysMask,
						startMin,
						durationMin
					};
					localStorage.setItem(SCHEDULE_STORAGE_KEY, JSON.stringify(payload));
				} catch (error) {
					console.warn('Failed to persist schedule cache', error);
				}
			};

			loadScheduleUiCache();
			loadManualHours();
			loadRemainingTime();
			const cachedRunState = loadRunNowState();
			switch_state.checked = cachedRunState === null ? (remaining_time_sec > 0) : cachedRunState;

			const getDaysMask = () => {
				let mask = 0;
				dayButtons.forEach((b, i) => {
					if (b.classList.contains('active')) mask |= (1 << i);
				});
				return mask;
			};

			const sendTimeSync = () => {
				const epochSec = Math.floor(Date.now() / 1000);
				const tzOffsetMin = new Date().getTimezoneOffset();
				const msg = `sync_time:${epochSec}:${tzOffsetMin}`;
				if (websocket.readyState === WebSocket.OPEN) websocket.send(msg);
			};

			const start_uptime_timer = () => {
				if (uptime_timer !== null) return;
				uptime_timer = setInterval(() => {
					uptime_sec += 1000;
					const sec = uptime_sec / 1000;
					const min = sec / 60;
					const hr = sec / 3600;
					const d = hr / 24;
					uptime.innerHTML = `${Math.floor(d)} ${pad0(hr % 24)}:${pad0(min % 60)}:${pad0(sec % 60)}`;
					if (local_epoch_sec >= 0) {
						local_epoch_sec += 1;
						renderCurrentTime();
					}
					if (remaining_time_sec > 0 && switch_state.checked) {
						remaining_time_sec--;
						renderTimeLeft();
						if (remaining_time_sec === 0) {
							switch_state.checked = false;
							renderManual();
						}
					}
				}, 1000);
			};

			const stop_uptime_timer = () => {
				if (uptime_timer !== null) {
					clearInterval(uptime_timer);
					uptime_timer = null;
				}
			};

			const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
			const websocket = new WebSocket(`${wsProtocol}//${window.location.host}${WS_PATH}`);
			window.websocket = websocket;

			websocket.onopen = function () {
				console.log('WebSocket connected');
				start_uptime_timer();
				sendTimeSync();
			};

			websocket.onclose = function () {
				console.warn('WebSocket disconnected â€” stopping uptime');
				stop_uptime_timer();
			};

			websocket.onmessage = function (event) {
				try {
					if (event.data.startsWith('notice:')) {
						scheduleStatus.textContent = event.data.slice('notice:'.length);
						return;
					}

					if (!event.data.startsWith("{")) {
						const logMessage = event.data.replace("[log]:", "");
						console.log(logMessage);
						return;
					}
					console.log(`event.data: ${event.data}`);
					const data = JSON.parse(event.data);
					if (data['uptime']) {
						uptime_sec = parseInt(data['uptime']) * 1000;
					}

					remaining_time_sec = parseInt(data['remaining_time']) || 0;
					saveRemainingTime();
					switch_state.checked = remaining_time_sec != 0;
					saveRunNowState(switch_state.checked);
					renderTimeLeft();
					renderManual();

					const hasScheduleFields =
						Object.prototype.hasOwnProperty.call(data, 'schedule_enabled') &&
						Object.prototype.hasOwnProperty.call(data, 'schedule_days') &&
						Object.prototype.hasOwnProperty.call(data, 'schedule_start') &&
						Object.prototype.hasOwnProperty.call(data, 'schedule_duration');

					if (hasScheduleFields) {
						const enabledNum = toIntOrNull(data['schedule_enabled']);
						const scheduleDays = toIntOrNull(data['schedule_days']);
						const startMin = toIntOrNull(data['schedule_start']);
						const durationMin = toIntOrNull(data['schedule_duration']);

						if (enabledNum !== null) scheduleEnabled.checked = enabledNum === 1;
						if (scheduleDays !== null) setDaysFromMask(scheduleDays & 0x7F);
						if (startMin !== null) {
							const hh = Math.floor(startMin / 60);
							const mm = startMin % 60;
							scheduleStart.value = `${pad0(hh)}:${pad0(mm)}`;
						}
						if (durationMin !== null) {
							scheduleDurationH.value = String(clamp(Math.round(durationMin / 60), 1, 12));
						}

						saveScheduleUiCache(
							enabledNum !== null ? (enabledNum === 1 ? 1 : 0) : (scheduleEnabled.checked ? 1 : 0),
							scheduleDays !== null ? (scheduleDays & 0x7F) : getDaysMask(),
							startMin !== null ? startMin : ((toIntOrNull(scheduleStart.value.split(':')[0]) || 0) * 60 + (toIntOrNull(scheduleStart.value.split(':')[1]) || 0)),
							durationMin !== null ? durationMin : (clamp(parseInt(scheduleDurationH.value, 10) || 1, 1, 12) * 60)
						);
					}

					const localEpoch = toIntOrNull(data['local_epoch']);
					if (localEpoch !== null && localEpoch >= 0) {
						local_epoch_sec = localEpoch;
						renderCurrentTime();
					}
				} catch (error) {
					console.error(error);
				}
			};

			const websocket_send_msg = () => {
				const targetSec = switch_state.checked ? manual_hours * 3600 : 0;
				saveRunNowState(switch_state.checked);
				const msg = 'set_duration:' + targetSec;
				if (websocket.readyState === WebSocket.OPEN) {
					console.log(`websocket.send: ${msg}`);
					websocket.send(msg);
					renderManual();
				} else {
					console.warn('WebSocket is not open, cannot send message');
				}
			};

			document.getElementById('switch_on_off').onclick = websocket_send_msg;

			plusH.onclick = () => {
				manual_hours = clamp(manual_hours + 1, 1, 12);
				saveManualHours();
				renderManual();
			};

			minusH.onclick = () => {
				manual_hours = clamp(manual_hours - 1, 1, 12);
				saveManualHours();
				renderManual();
			};

			saveSchedule.onclick = () => {
				const daysMask = getDaysMask();
				const timeParts = (scheduleStart.value || '08:00').split(':');
				const startMin = (parseInt(timeParts[0]) || 0) * 60 + (parseInt(timeParts[1]) || 0);
				const durationHours = clamp(parseInt(scheduleDurationH.value) || 1, 1, 12);
				const durationMin = durationHours * 60;
				const enabled = scheduleEnabled.checked ? 1 : 0;

				saveScheduleUiCache(enabled, daysMask, startMin, durationMin);

				const msg = `set_schedule:${enabled}:${daysMask}:${startMin}:${durationMin}`;
				if (websocket.readyState === WebSocket.OPEN) {
					websocket.send(msg);
					scheduleStatus.textContent = 'Schedule saved';
				} else {
					scheduleStatus.textContent = 'WebSocket disconnected';
				}
			};

			renderManual();
			renderTimeLeft();
			renderCurrentTime();
			requestAnimationFrame(() => {
				if (runNowWrap) {
					runNowWrap.style.visibility = 'visible';
					runNowWrap.classList.remove('init');
				}
				if (appPanel) appPanel.classList.remove('booting');
			});
		})();
	</script>
