<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=windows-1252" />
	<meta name="viewport" content="width=device-width">
	<style>
<!-- #include "index_style.css" -->
	</style>
</head>

<body>
	<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
		<symbol id="icon-plus" viewBox="0 0 24 24">
			<rect x="10.5" y="4" width="3" height="16" rx="1" />
			<rect x="4" y="10.5" width="16" height="3" rx="1" />
		</symbol>
		<symbol id="icon-minus" viewBox="0 0 24 24">
			<rect x="4" y="10.5" width="16" height="3" rx="1" />
		</symbol>
	</svg>
	<div class="panel booting" id="app_panel">
		<div class="header-row">
			<h1>Timer</h1>
			<div class="status-inline">
					<div class="subtle" id="connection_state">Time left</div>
				<div id="time_left" class="status">0:00:00</div>
			</div>
		</div>
		<div class="section">
			<h2>Schedule</h2>
			<div class="switch-row" style="margin-bottom: 10px;">
				<input type="checkbox" id="schedule_enabled">
				<label for="schedule_enabled">Enable weekly schedule</label>
			</div>

			<div class="subtle" style="margin-bottom: 6px;">Days</div>
			<div class="day-grid" id="day_grid">
				<button type="button" class="day-btn" data-day="0">Sun</button>
				<button type="button" class="day-btn" data-day="1">Mon</button>
				<button type="button" class="day-btn" data-day="2">Tue</button>
				<button type="button" class="day-btn" data-day="3">Wed</button>
				<button type="button" class="day-btn" data-day="4">Thu</button>
				<button type="button" class="day-btn" data-day="5">Fri</button>
				<button type="button" class="day-btn" data-day="6">Sat</button>
			</div>

			<div class="row" style="margin-top: 12px;">
				<label for="schedule_start">Start</label>
				<input class="input" type="time" id="schedule_start" value="08:00">
			</div>

			<div class="row" style="margin-top: 12px;">
				<label for="schedule_duration_h_value">Duration</label>
				<div class="stepper-row">
					<div class="stepper-group" aria-label="Schedule hours">
						<button type="button" class="stepper-btn" id="schedule_duration_h_down" aria-label="Decrease schedule hours">-</button>
						<div class="stepper-value" id="schedule_duration_h_value">2</div>
						<button type="button" class="stepper-btn" id="schedule_duration_h_up" aria-label="Increase schedule hours">+</button>
						<span class="stepper-unit">h</span>
					</div>
					<div class="stepper-group" aria-label="Schedule minutes">
						<button type="button" class="stepper-btn" id="schedule_duration_m_down" aria-label="Decrease schedule minutes">-</button>
						<div class="stepper-value" id="schedule_duration_m_value">0</div>
						<button type="button" class="stepper-btn" id="schedule_duration_m_up" aria-label="Increase schedule minutes">+</button>
						<span class="stepper-unit">m</span>
					</div>
				</div>
			</div>

			<button class="primary" id="save_schedule" style="margin-top: 12px;">Save Schedule</button>
			<div id="schedule_status" class="subtle" style="margin-top: 8px; min-height: 1.2em;"></div>
		</div>

		<div class="section" id="manual_section">
			<div class="header-row" style="align-items: center; margin-bottom: 10px;">
				<h2 style="margin: 0;">Manual Run</h2>
				<div class="switch-row">
					<label class="slider-toggle init" id="run_now_wrap" style="visibility:hidden;">
						<input type="checkbox" id="switch_on_off">
						<span class="slider-track"></span>
					</label>
					<label for="switch_on_off">Run now</label>
				</div>
			</div>
			<div class="row" style="margin-top: 8px; gap: 6px; align-items: center;">
				<label for="manual_duration_h_value">Duration</label>
				<div class="stepper-row">
					<div class="stepper-group" aria-label="Manual hours">
						<button type="button" class="stepper-btn" id="manual_duration_h_down" aria-label="Decrease manual hours">-</button>
						<div class="stepper-value" id="manual_duration_h_value">5</div>
						<button type="button" class="stepper-btn" id="manual_duration_h_up" aria-label="Increase manual hours">+</button>
						<span class="stepper-unit">h</span>
					</div>
					<div class="stepper-group" aria-label="Manual minutes">
						<button type="button" class="stepper-btn" id="manual_duration_m_down" aria-label="Decrease manual minutes">-</button>
						<div class="stepper-value" id="manual_duration_m_value">0</div>
						<button type="button" class="stepper-btn" id="manual_duration_m_up" aria-label="Increase manual minutes">+</button>
						<span class="stepper-unit">m</span>
					</div>
				</div>
			</div>
		</div>

		<div class="section">
			<h3>Build: __DATE__</h3>
			<h3>Current time: <span id="current_time">--</span></h3>
			<h3>Uptime: <span id="uptime">0 00:00:00</span></h3>
			<h3><a href="/clear">Reset WiFi</a></h3>
		</div>
	</div>
	<script>
<!-- #include "index_script.js" -->
	</script>
</body>

</html>
